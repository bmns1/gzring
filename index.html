<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GZRING.COM | Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #1E3D33; /* Deep Green matching your Eid theme */
            --accent-gold: #C5A059; /* Gold matching your Eid theme */
            --text-light: #F7F5F0;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--primary-bg);
            /* Subtle animated gradient background */
            background: radial-gradient(circle at top right, #2A5245, #1E3D33, #0d1a16);
            font-family: 'Lato', sans-serif;
            color: var(--text-light);
            overflow: hidden;
        }

        /* Decorative background element */
        .orb {
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--accent-gold);
            filter: blur(100px);
            opacity: 0.1;
            border-radius: 50%;
            animation: float 10s infinite ease-in-out;
            z-index: 0;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.05); /* Glass effect */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 50px 40px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 90%;
        }

        /* Logo Placeholder Styles */
        .logo-placeholder {
            max-width: 180px; /* Adjust width as desired */
            height: auto;
            display: block;
            margin: 0 auto 25px auto; /* Centers image and adds bottom margin */
            /* Adds a subtle shadow to make the gold pop off the glass */
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem; /* Slightly smaller to accommodate logo */
            margin: 0 0 10px 0;
            letter-spacing: 4px;
            background: linear-gradient(45deg, #fff, var(--accent-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .divider {
            height: 2px;
            width: 60px;
            background: var(--accent-gold);
            margin: 20px auto;
            border-radius: 2px;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: rgba(247, 245, 240, 0.8);
            font-weight: 300;
        }

        .event-link {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 25px;
            border: 1px solid rgba(197, 160, 89, 0.5);
            border-radius: 50px;
            color: var(--accent-gold);
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .event-link:hover {
            background: var(--accent-gold);
            color: var(--primary-bg);
            box-shadow: 0 0 15px rgba(197, 160, 89, 0.3);
        }

        @keyframes float {
            0% { transform: translate(0, 0); }
            50% { transform: translate(30px, -30px); }
            100% { transform: translate(0, 0); }
        }
    </style>
</head>
<body>

    <div class="orb" style="top: -100px; left: -100px;"></div>
    <div class="orb" style="bottom: -100px; right: -100px; animation-delay: -5s;"></div>

    <div class="container">
        <img src="https://raw.githubusercontent.com/bmns1/gzring/refs/heads/main/logo_gz.png" alt="GZRING Logo" class="logo-placeholder" onerror="this.style.display='none'">
        
        <h1>GZRING</h1>
        <div class="divider"></div>
        <p>Something wonderful is being built.</p>
        <p>Please check back soon.</p>

    </div>

</body>
</html>
